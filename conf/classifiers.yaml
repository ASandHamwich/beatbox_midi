# Classifier registry.
#
# Each entry maps a short name to a sklearn class and its constructor params.
# `random_state` is intentionally absent — it is injected automatically from
# model.yaml at build time so all classifiers share the same seed.
#
# To add a new classifier: add an entry here and import the class in train.py.

random_forest:
  class: RandomForestClassifier
  params:
    n_estimators: 200
    max_features: sqrt
    class_weight: balanced   # compensates for the clap minority class
    n_jobs: -1

svm:
  class: SVC
  params:
    kernel: rbf
    class_weight: balanced
    probability: true        # required for predict_proba support

gradient_boosting:
  class: HistGradientBoostingClassifier
  params:
    class_weight: balanced
    max_iter: 200
